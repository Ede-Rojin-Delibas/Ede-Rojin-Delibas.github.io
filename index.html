  <button class="active" onclick="filterProjects('all')">ALL CATEGORIES</button>
  <button onclick="filterProjects('data-science')">DATA SCIENCE</button>
  <button onclick="filterProjects('ai-systems')">AI SYSTEMS</button>

<div class="grid">

  <div class="card" data-category="data-science" onclick="location.href='project1.html'">

<script>
function filterProjects(category) {
  const cards = document.querySelectorAll('.card');
  const buttons = document.querySelectorAll('.filter button');
  
  // Update active button
  buttons.forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  
  // Filter cards
  cards.forEach(card => {
    if (category === 'all' || card.dataset.category === category) {
      card.style.display = 'flex';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>
